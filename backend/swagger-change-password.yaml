openapi: 3.0.3
info:
  title: 修改密码 API
  description: 用户修改自身密码的接口。需要 JWT Bearer Token 认证。
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: 本地开发环境

paths:
  /api/auth/change-password:
    post:
      tags:
        - auth
      summary: 修改当前用户密码
      description: |
        已登录用户通过提供原密码和新密码来修改自己的密码。
        - 原密码必须正确
        - 新密码最少 6 个字符
        - 修改成功后前端应清除 token 并跳转到登录页
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            examples:
              normal:
                summary: 正常修改密码
                value:
                  oldPassword: "current123"
                  newPassword: "newPass456"
      responses:
        '200':
          description: 密码修改成功
          headers:
            X-New-Token:
              description: 当 token 剩余有效期不足 2 小时时，服务端会自动签发新 token 并通过此 header 返回
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "密码修改成功"
        '401':
          description: 未登录或 token 已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "未登录或 token 已过期"
                  detail: null
        '422':
          description: 原密码错误 或 请求体校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                wrongPassword:
                  summary: 原密码不正确
                  value:
                    error:
                      code: "WRONG_PASSWORD"
                      message: "原密码错误"
                      detail: null
                validationError:
                  summary: 请求体字段校验失败（如新密码不足 6 位）
                  value:
                    error:
                      code: "VALIDATION_ERROR"
                      message: "业务规则校验失败"
                      detail: null
        '500':
          description: 服务内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: "INTERNAL_ERROR"
                  message: "服务内部错误"
                  detail: "Exception: ..."

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        使用登录接口 POST /api/auth/login 获取 token，
        然后在请求头中传入：Authorization: Bearer <token>

  schemas:
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          minLength: 1
          description: 当前密码
          example: "current123"
        newPassword:
          type: string
          minLength: 6
          description: 新密码（最少 6 个字符）
          example: "newPass456"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: 操作结果消息
          example: "密码修改成功"

    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: 错误码
          example: "WRONG_PASSWORD"
        message:
          type: string
          description: 错误消息
          example: "原密码错误"
        detail:
          type: string
          nullable: true
          description: 错误详情（仅在 500 错误时返回具体异常信息）
          example: null
