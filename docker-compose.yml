services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: testbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/testbench
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      WORKERS: ${WORKERS:-2}
      # AI / LLM
      AI_PROVIDER: ${AI_PROVIDER:-openai_compatible}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_AUTH_TOKEN: ${AI_AUTH_TOKEN:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-4096}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-120}
      AI_ENABLED: ${AI_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
